# 宿主机 Nginx 反向代理配置
# 由 deploy workflow 自动同步到服务器
# 宝塔面板路径：/www/server/nginx/conf/conf.d/autoattend.conf
# 标准路径：/etc/nginx/conf.d/autoattend.conf
# 修改此文件后 push 到 main 即可自动生效

client_max_body_size 200M;

# ============================================================
# HTTP → HTTPS 重定向（旧域名 + 新域名）
# ============================================================
server {
    listen 80;
    server_name liubangproject.tech www.liubangproject.tech autoattend.xn--gnr55wfngz8f.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其他请求全部 301 到 HTTPS（新域名）
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================
# HTTPS 主站（新域名 liubangproject.tech）
# ============================================================
server {
    listen 443 ssl http2;
    server_name liubangproject.tech www.liubangproject.tech;

    # SSL 证书（由 certbot 自动生成和管理）
    ssl_certificate /etc/letsencrypt/live/liubangproject.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/liubangproject.tech/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # 主前端（报价系统）
    location / {
        proxy_pass http://127.0.0.1:8849;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 15s;
    }

    # 后端 API
    location /api/ {
        proxy_pass http://127.0.0.1:8848;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 15s;
    }

    # 监测台前端
    location /monitor/ {
        proxy_pass http://127.0.0.1:8850/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MinIO 控制台（可选）
    location /minio/ {
        proxy_pass http://127.0.0.1:9002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ============================================================
# HTTPS 旧域名（保留访问，重定向到新域名）
# ============================================================
server {
    listen 443 ssl http2;
    server_name autoattend.xn--gnr55wfngz8f.com;

    # 旧域名 SSL 证书（如果有的话，没有则注释掉 ssl_ 开头的行）
    # ssl_certificate /etc/letsencrypt/live/autoattend.xn--gnr55wfngz8f.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/autoattend.xn--gnr55wfngz8f.com/privkey.pem;

    # 301 重定向到新域名
    return 301 https://liubangproject.tech$request_uri;
}
