# 生产环境使用：仅拉取镜像，不 build。镜像由 GitHub Actions 构建并推送到 ghcr.io。
# 使用前在服务器上设置环境变量（或由 deploy workflow 自动设置）：
#   export IMAGE_BACKEND=ghcr.io/你的用户名/autoattend-backend:latest
#   export IMAGE_FRONTEND=ghcr.io/你的用户名/autoattend-frontend:latest

services:
  mysql:
    image: mysql:8.4
    container_name: autoattend-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: autoattend
      MYSQL_USER: autoattend
      MYSQL_PASSWORD: autoattend_pwd
      TZ: Asia/Shanghai
    # 不映射 3306 到主机，避免与服务器上已有 MySQL 冲突；backend 通过 Docker 网络访问 mysql:3306
    # 若需从主机连接：docker exec -it autoattend-mysql mysql -u root -p
    volumes:
      - autoattend_mysql_data:/var/lib/mysql
      - ./atuo_attend_backend/src/main/resources/db/schema_mysql.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./atuo_attend_backend/src/main/resources/db/schema_collab_mysql.sql:/docker-entrypoint-initdb.d/02_schema_collab.sql:ro
    command: ["--character-set-server=utf8mb4","--collation-server=utf8mb4_unicode_ci"]

  minio:
    image: minio/minio:latest
    container_name: autoattend-minio
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - autoattend_minio_data:/data
    ports:
      - "9000:9000"
      - "9002:9001"   # 控制台用 9002，避免与主机已占用的 9001 冲突

  backend:
    image: ${IMAGE_BACKEND:-ghcr.io/please-set/autoattend-backend:latest}
    container_name: autoattend-backend
    depends_on:
      - mysql
      - minio
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: autoattend
      DB_USER: autoattend
      DB_PASSWORD: autoattend_pwd
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      # 配置 GITHUB_TOKEN 后可拉取 commit diff（否则易受限流或拉取失败，查看 Diff 会显示占位提示）
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      # 大陆服务器可设置 HTTP/SOCKS 代理以访问 api.github.com，如 http://127.0.0.1:7890
      GITHUB_API_PROXY: ${GITHUB_API_PROXY:-}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: autoattend-attachments
    ports:
      - "8848:8848"
    restart: unless-stopped

  frontend:
    image: ${IMAGE_FRONTEND:-ghcr.io/please-set/autoattend-frontend:latest}
    container_name: autoattend-frontend
    depends_on:
      - backend
    ports:
      - "8849:80"
    restart: unless-stopped

volumes:
  autoattend_mysql_data:
  autoattend_minio_data:
