name: liubang_shell
description: 流帮 Project 官方壳（WebView 加载 Web 控制台）
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.10.0
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "icon_source.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "icon_source.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
