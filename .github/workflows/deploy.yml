# push 到 main（或 master）时：校验迁移清单与前端构建 → 构建并推送镜像 → SSH 部署 → 强制重建 backend 执行 migrate_manifest.txt 中的 SQL → 等待健康后重启前端
# 数据库迁移：由 backend 容器 docker-entrypoint.sh 在启动 Spring 前执行，无需在服务器手工 mysql。
name: Build and Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 防止新增 schema_*migration*.sql 却未写入 migrate_manifest.txt，导致推送 main 后线上库未升级
      - name: Verify DB migrate manifest
        run: bash atuo_attend_backend/scripts/check-migrate-manifest.sh

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: auto_attend_forntend/package-lock.json

      # 在推镜像前先本地构建主前端，避免仅 Docker 内失败才发现问题
      - name: Build main frontend (sanity)
        working-directory: auto_attend_forntend
        run: |
          npm ci
          npm run build

      - name: Set image names
        id: images
        run: |
          OWNER="${{ github.repository_owner }}"
          OWNER_LC=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          echo "backend=$REGISTRY/$OWNER_LC/autoattend-backend:latest" >> $GITHUB_OUTPUT
          echo "frontend=$REGISTRY/$OWNER_LC/autoattend-frontend:latest" >> $GITHUB_OUTPUT
          echo "platform_monitor_frontend=$REGISTRY/$OWNER_LC/platform-monitor-frontend:latest" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR 偶发「Client.Timeout exceeded while awaiting headers」；Buildx + 推送重试缓解
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 45
          max_attempts: 4
          retry_wait_seconds: 45
          warning_on_retry: true
          command: docker buildx build --push -t "${{ steps.images.outputs.backend }}" ./atuo_attend_backend

      - name: Build and push frontend
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 45
          max_attempts: 4
          retry_wait_seconds: 45
          warning_on_retry: true
          command: docker buildx build --push -t "${{ steps.images.outputs.frontend }}" ./auto_attend_forntend

      - name: Build and push platform monitor frontend
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 45
          max_attempts: 4
          retry_wait_seconds: 45
          warning_on_retry: true
          command: docker buildx build --push -t "${{ steps.images.outputs.platform_monitor_frontend }}" ./platform_monitor_frontend

      - name: Deploy to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/mnt/newdisk/app/AutoAttend' }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${SSH_PORT}" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -P "${SSH_PORT}" -r \
            docker-compose.prod.yml \
            docker-compose.penpot.yml \
            deploy/nginx-autoattend.conf \
            atuo_attend_backend \
            "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/"

      # 可选：若 ghcr.io 镜像为私有，请在仓库 Secrets 中配置 GHCR_USERNAME + GHCR_READ_TOKEN（PAT 勾选 read:packages），
      # 否则服务器上 docker compose pull 可能报 unauthorized。
      # v1.0.3 在 Docker 内跑 drone-ssh 时，command_timeout 带「m」偶发被误解析（约 60s 即杀远程脚本），与真实等待无关。
      # 升级到 v1.2.x（composite）+ 秒级 command_timeout；并将「等 8848」单独一步，避免与 compose 争同一限时。
      - name: Pull service images on server
        uses: appleboy/ssh-action@v1.2.5
        env:
          IMAGE_BACKEND: ${{ steps.images.outputs.backend }}
          IMAGE_FRONTEND: ${{ steps.images.outputs.frontend }}
          IMAGE_PLATFORM_MONITOR_FRONTEND: ${{ steps.images.outputs.platform_monitor_frontend }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USER: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 3600s
          timeout: 300s
          envs: IMAGE_BACKEND,IMAGE_FRONTEND,IMAGE_PLATFORM_MONITOR_FRONTEND,DEPLOY_PATH,GHCR_USER,GHCR_TOKEN,GITHUB_SHA
          script: |
            set -e
            DPATH="${DEPLOY_PATH:-/mnt/newdisk/app/AutoAttend}"
            cd "$DPATH"
            mkdir -p "$DPATH/git-repos"
            echo "DEPLOY_STAGE=pull SHA=${GITHUB_SHA:-unknown}"
            if [ -n "$GHCR_TOKEN" ] && [ -n "$GHCR_USER" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            fi
            export IMAGE_BACKEND IMAGE_FRONTEND IMAGE_PLATFORM_MONITOR_FRONTEND
            docker compose -f docker-compose.prod.yml pull
            echo "DEPLOY_STAGE=pull OK"

      - name: Deploy stack on server (nginx + backend)
        uses: appleboy/ssh-action@v1.2.5
        env:
          IMAGE_BACKEND: ${{ steps.images.outputs.backend }}
          IMAGE_FRONTEND: ${{ steps.images.outputs.frontend }}
          IMAGE_PLATFORM_MONITOR_FRONTEND: ${{ steps.images.outputs.platform_monitor_frontend }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USER: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 2400s
          timeout: 300s
          envs: IMAGE_BACKEND,IMAGE_FRONTEND,IMAGE_PLATFORM_MONITOR_FRONTEND,DEPLOY_PATH,GHCR_USER,GHCR_TOKEN,GITHUB_SHA
          script: |
            set -e
            DPATH="${DEPLOY_PATH:-/mnt/newdisk/app/AutoAttend}"
            cd "$DPATH"
            mkdir -p "$DPATH/git-repos"
            echo "DEPLOY_SCRIPT_TAG=v7-stack SHA=${GITHUB_SHA:-unknown}"

            set +e
            sc=$(grep -c 'condition: service_started' docker-compose.prod.yml 2>/dev/null)
            set -e
            if [ "${sc:-0}" -lt 3 ]; then
              echo "错误: 服务器上的 docker-compose.prod.yml 过旧（condition: service_started 出现 ${sc:-0} 次，需>=3）。"
              echo "请确认已将包含「前端仅 depends_on backend: service_started」的提交推送到 main，且本 job 的 Deploy to server 已 scp 最新文件。"
              grep 'condition: service' docker-compose.prod.yml || true
              exit 1
            fi

            if [ -n "$GHCR_TOKEN" ] && [ -n "$GHCR_USER" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            fi
            export IMAGE_BACKEND IMAGE_FRONTEND IMAGE_PLATFORM_MONITOR_FRONTEND

            # 同步宿主机 Nginx 配置并 reload（兼容宝塔面板和标准 Nginx）
            # 宝塔面板：配置在 /www/server/nginx/conf/vhost/ 或 nginx.conf 中
            # 标准 Nginx：配置在 /etc/nginx/conf.d/
            NGINX_BIN=""
            NGINX_CONF_DIR=""
            if [ -x /www/server/nginx/sbin/nginx ]; then
              NGINX_BIN="/www/server/nginx/sbin/nginx"
              # 宝塔：尝试 vhost 目录（站点配置），回退到 conf.d
              if [ -d /www/server/nginx/conf/vhost ]; then
                NGINX_CONF_DIR="/www/server/nginx/conf/vhost"
              elif [ -d /www/server/nginx/conf/conf.d ]; then
                NGINX_CONF_DIR="/www/server/nginx/conf/conf.d"
              fi
            elif command -v nginx &>/dev/null; then
              NGINX_BIN="nginx"
              NGINX_CONF_DIR="/etc/nginx/conf.d"
            fi

            # ===== 步骤 1：先部署 Nginx 配置（含 ACME challenge location）=====
            if [ -n "$NGINX_BIN" ] && [ -f deploy/nginx-autoattend.conf ]; then
              if [ -n "$NGINX_CONF_DIR" ] && [ -d "$NGINX_CONF_DIR" ]; then
                cp deploy/nginx-autoattend.conf "$NGINX_CONF_DIR/autoattend.conf"
                echo "Nginx 配置已复制到 $NGINX_CONF_DIR/autoattend.conf"
              fi
              # 确保 client_max_body_size 全局生效
              NGINX_MAIN_CONF=""
              if [ -f /www/server/nginx/conf/nginx.conf ]; then
                NGINX_MAIN_CONF="/www/server/nginx/conf/nginx.conf"
              elif [ -f /etc/nginx/nginx.conf ]; then
                NGINX_MAIN_CONF="/etc/nginx/nginx.conf"
              fi
              if [ -n "$NGINX_MAIN_CONF" ] && ! grep -q "client_max_body_size" "$NGINX_MAIN_CONF"; then
                sed -i '1i client_max_body_size 200M;' "$NGINX_MAIN_CONF"
                echo "已在 $NGINX_MAIN_CONF 顶部注入 client_max_body_size 200M"
              fi
              # 如果 SSL 证书不存在，先部署纯 HTTP 临时配置让 ACME challenge 可达
              NEW_DOMAIN="liubangproject.tech"
              if [ ! -f "/etc/letsencrypt/live/$NEW_DOMAIN/fullchain.pem" ]; then
                echo "SSL 证书不存在，部署临时 HTTP 配置用于 ACME 验证..."
                printf '%s\n' \
                  'client_max_body_size 200M;' \
                  'server {' \
                  '    listen 80;' \
                  "    server_name liubangproject.tech www.liubangproject.tech autoattend.xn--gnr55wfngz8f.com;" \
                  '    location /.well-known/acme-challenge/ { root /var/www/certbot; }' \
                  '    location / { proxy_pass http://127.0.0.1:8849; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }' \
                  '}' > "$NGINX_CONF_DIR/autoattend.conf"
              fi
              # 测试并 reload
              $NGINX_BIN -t 2>/dev/null
              if [ $? -eq 0 ]; then
                /etc/init.d/nginx reload 2>/dev/null || systemctl reload nginx 2>/dev/null || $NGINX_BIN -s reload 2>/dev/null
                echo "Nginx reload 成功"
              else
                echo "警告: Nginx 配置语法错误，跳过 reload"
              fi
            else
              echo "警告: 未找到 Nginx，跳过配置同步"
            fi

            # ===== 步骤 2：SSL 证书（已移除自动申请逻辑，请手动配置）=====
            # 注意：自动 SSL 申请（certbot/Let's Encrypt）已移除，因为自动化流程无法可靠生效。
            # 如需 SSL，请手动在服务器上执行：
            #   certbot certonly --webroot -w /var/www/certbot -d liubangproject.tech -d www.liubangproject.tech
            # 或通过宝塔面板等工具配置。
            mkdir -p /var/www/certbot
            echo "SSL 证书自动申请已移除，请手动配置。如需 HTTPS，请确保 /etc/letsencrypt/live/liubangproject.tech/fullchain.pem 存在。"

            # 先起 backend 的依赖（含 penpot-frontend: started），再单次强制重建 backend。
            # 避免「先全量 up -d 已启动 backend，再 force-recreate backend」导致迁移脚本与 JVM 冷启动跑两遍、8848 迟迟不可用并挤爆 SSH 总时长。
            docker compose -f docker-compose.prod.yml up -d mysql minio penpot-frontend
            docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate backend
            echo "DEPLOY_STAGE=backend_container_started"

      # drone-ssh 单条远程会话在部分环境下仍有 ~90s 上限；8848 未就绪时需长等。改为 Runner 上短 SSH 轮询（每轮独立连接），避免误杀并周期性打出后端日志便于排查。
      - name: Wait for backend 8848 (runner SSH poll)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -e
          PORT="${SSH_PORT:-22}"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_wait_key
          chmod 600 ~/.ssh/deploy_wait_key
          ssh-keyscan -p "$PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "DEPLOY_SCRIPT_TAG=v8-wait-runner-ssh SHA=${GITHUB_SHA:-unknown}"
          echo "等待宿主机 127.0.0.1:8848（每 10s 一轮短 SSH，最多 120 轮 ≈1200s）。若失败请根据下方日志在服务器继续排查。"

          run_ssh () {
            ssh -i ~/.ssh/deploy_wait_key -o StrictHostKeyChecking=no -p "$PORT" "$SSH_USER@$SSH_HOST" "$@"
          }

          chk='curl -sS --connect-timeout 4 -o /dev/null http://127.0.0.1:8848/actuator/health/liveness || curl -sS --connect-timeout 4 -o /dev/null http://127.0.0.1:8848/actuator/health || curl -sS --connect-timeout 4 -o /dev/null http://127.0.0.1:8848/ || (command -v wget >/dev/null 2>&1 && wget -q -O /dev/null --timeout=4 http://127.0.0.1:8848/)'

          for round in $(seq 1 120); do
            if run_ssh "$chk"; then
              echo "backend 已对宿主机 8848 响应 HTTP（第 ${round} 轮）"
              exit 0
            fi
            echo "[wait] 第 ${round} 轮 / 120，8848 仍不可达"
            run_ssh "docker inspect autoattend-backend 2>/dev/null | head -c 4000 || true" || true
            if [ "$((round % 3))" -eq 0 ]; then
              echo "---- backend 最近日志 ----"
              run_ssh "docker logs --tail 100 autoattend-backend 2>&1" || true
            fi
            sleep 10
          done

          echo "==== 8848 在预期时间内仍不可访问：以下为 CI 从服务器抓取的信息；请 SSH 登录后继续排查 ===="
          run_ssh "docker inspect autoattend-backend 2>/dev/null | head -c 8000 || true" || true
          run_ssh "docker exec autoattend-backend curl -sS -o /dev/null --connect-timeout 3 http://127.0.0.1:8848/ || echo in_container_curl_fail" || true
          run_ssh "docker logs --tail 300 autoattend-backend 2>&1" || true
          exit 1

      - name: Recreate frontends on server
        uses: appleboy/ssh-action@v1.2.5
        env:
          IMAGE_BACKEND: ${{ steps.images.outputs.backend }}
          IMAGE_FRONTEND: ${{ steps.images.outputs.frontend }}
          IMAGE_PLATFORM_MONITOR_FRONTEND: ${{ steps.images.outputs.platform_monitor_frontend }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USER: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 1200s
          timeout: 300s
          envs: IMAGE_BACKEND,IMAGE_FRONTEND,IMAGE_PLATFORM_MONITOR_FRONTEND,DEPLOY_PATH,GHCR_USER,GHCR_TOKEN,GITHUB_SHA
          script: |
            set -e
            DPATH="${DEPLOY_PATH:-/mnt/newdisk/app/AutoAttend}"
            cd "$DPATH"
            echo "DEPLOY_SCRIPT_TAG=v7-frontends SHA=${GITHUB_SHA:-unknown}"
            if [ -n "$GHCR_TOKEN" ] && [ -n "$GHCR_USER" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            fi
            export IMAGE_BACKEND IMAGE_FRONTEND IMAGE_PLATFORM_MONITOR_FRONTEND
            docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate frontend platform-monitor-frontend

