# push 到 main（或 master）时：校验迁移清单与前端构建 → 构建并推送镜像 → SSH 部署 → 强制重建 backend 执行 migrate_manifest.txt 中的 SQL → 等待健康后重启前端
# 数据库迁移：由 backend 容器 docker-entrypoint.sh 在启动 Spring 前执行，无需在服务器手工 mysql。
name: Build and Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 防止新增 schema_*migration*.sql 却未写入 migrate_manifest.txt，导致推送 main 后线上库未升级
      - name: Verify DB migrate manifest
        run: bash atuo_attend_backend/scripts/check-migrate-manifest.sh

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: auto_attend_forntend/package-lock.json

      # 在推镜像前先本地构建主前端，避免仅 Docker 内失败才发现问题
      - name: Build main frontend (sanity)
        working-directory: auto_attend_forntend
        run: |
          npm ci
          npm run build

      - name: Set image names
        id: images
        run: |
          OWNER="${{ github.repository_owner }}"
          OWNER_LC=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          echo "backend=$REGISTRY/$OWNER_LC/autoattend-backend:latest" >> $GITHUB_OUTPUT
          echo "frontend=$REGISTRY/$OWNER_LC/autoattend-frontend:latest" >> $GITHUB_OUTPUT
          echo "platform_monitor_frontend=$REGISTRY/$OWNER_LC/platform-monitor-frontend:latest" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./atuo_attend_backend
          push: true
          tags: ${{ steps.images.outputs.backend }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./auto_attend_forntend
          push: true
          tags: ${{ steps.images.outputs.frontend }}

      - name: Build and push platform monitor frontend
        uses: docker/build-push-action@v5
        with:
          context: ./platform_monitor_frontend
          push: true
          tags: ${{ steps.images.outputs.platform_monitor_frontend }}

      - name: Deploy to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/mnt/newdisk/app/AutoAttend' }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${SSH_PORT}" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -P "${SSH_PORT}" -r \
            docker-compose.prod.yml \
            atuo_attend_backend \
            "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/"

      # 可选：若 ghcr.io 镜像为私有，请在仓库 Secrets 中配置 GHCR_USERNAME + GHCR_READ_TOKEN（PAT 勾选 read:packages），
      # 否则服务器上 docker compose pull 可能报 unauthorized。
      - name: Start containers on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_BACKEND: ${{ steps.images.outputs.backend }}
          IMAGE_FRONTEND: ${{ steps.images.outputs.frontend }}
          IMAGE_PLATFORM_MONITOR_FRONTEND: ${{ steps.images.outputs.platform_monitor_frontend }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USER: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 3h
          envs: IMAGE_BACKEND,IMAGE_FRONTEND,IMAGE_PLATFORM_MONITOR_FRONTEND,DEPLOY_PATH,GHCR_USER,GHCR_TOKEN,GITHUB_SHA
          script: |
            set -e
            DPATH="${DEPLOY_PATH:-/mnt/newdisk/app/AutoAttend}"
            cd "$DPATH"
            mkdir -p "$DPATH/git-repos"
            echo "DEPLOY_SCRIPT_TAG=v5-staged-host-probe SHA=${GITHUB_SHA:-unknown}"

            set +e
            sc=$(grep -c 'condition: service_started' docker-compose.prod.yml 2>/dev/null)
            set -e
            if [ "${sc:-0}" -lt 3 ]; then
              echo "错误: 服务器上的 docker-compose.prod.yml 过旧（condition: service_started 出现 ${sc:-0} 次，需>=3）。"
              echo "请确认已将包含「前端仅 depends_on backend: service_started」的提交推送到 main，且本 job 的 Deploy to server 已 scp 最新文件。"
              grep 'condition: service' docker-compose.prod.yml || true
              exit 1
            fi

            if [ -n "$GHCR_TOKEN" ] && [ -n "$GHCR_USER" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            fi
            export IMAGE_BACKEND IMAGE_FRONTEND IMAGE_PLATFORM_MONITOR_FRONTEND
            docker compose -f docker-compose.prod.yml pull

            # 分步 up，避免单次 up 在旧 compose（前端等 backend 健康）下永久 Waiting
            docker compose -f docker-compose.prod.yml up -d mysql minio
            docker compose -f docker-compose.prod.yml up -d backend
            docker compose -f docker-compose.prod.yml up -d frontend platform-monitor-frontend

            # 数据库迁移：强制重建 backend 跑 migrate_manifest.txt
            docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate backend

            # 以宿主机访问 8848 为准（映射端口），不依赖 Docker Health（避免 unhealthy 无输出时脚本也过不了）
            echo "等待 127.0.0.1:8848 可访问（curl/wget 宿主机）..."
            status=""
            for i in $(seq 1 300); do
              if curl -sS --connect-timeout 3 -o /dev/null http://127.0.0.1:8848/ 2>/dev/null \
                || wget -q -O /dev/null --timeout=3 http://127.0.0.1:8848/ 2>/dev/null; then
                echo "backend 已对宿主机 8848 响应 HTTP"
                status=ready
                break
              fi
              hb=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' autoattend-backend 2>/dev/null || echo "missing")
              if [ "$hb" = "healthy" ]; then
                echo "backend Docker Health=healthy"
                status=ready
                break
              fi
              if [ "$((i % 30))" -eq 0 ]; then
                echo "[wait] 约$((i * 2))s 8848 仍不可达，Docker.Health=$hb"
                docker inspect autoattend-backend --format='Status={{.State.Status}} Exit={{.State.ExitCode}}' 2>/dev/null || true
              fi
              sleep 2
            done

            if [ "$status" != "ready" ]; then
              echo "8848 在预期时间内不可访问"
              echo "---- State.Health JSON ----"
              docker inspect autoattend-backend --format='{{json .State.Health}}' 2>/dev/null || true
              echo "---- 容器内 curl 8848 ----"
              docker exec autoattend-backend sh -c 'curl -sS -o /dev/null -w "http_code=%{http_code}\n" --connect-timeout 3 http://127.0.0.1:8848/ || echo curl_fail' 2>&1 || true
              echo "---- autoattend-backend 日志 ----"
              docker logs --tail 200 autoattend-backend 2>&1 || true
              exit 1
            fi

            docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate frontend platform-monitor-frontend
