# push 到 main 分支时：在 GitHub 云端构建 backend/frontend 镜像 → 推送到 ghcr.io → SSH 到服务器拉取并重启
name: Build and Deploy

on:
  push:
    branches: [main, master]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image names
        id: images
        run: |
          OWNER="${{ github.repository_owner }}"
          OWNER_LC=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          echo "backend=$REGISTRY/$OWNER_LC/autoattend-backend:latest" >> $GITHUB_OUTPUT
          echo "frontend=$REGISTRY/$OWNER_LC/autoattend-frontend:latest" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./atuo_attend_backend
          push: true
          tags: ${{ steps.images.outputs.backend }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./auto_attend_forntend
          push: true
          tags: ${{ steps.images.outputs.frontend }}

      - name: Deploy to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/mnt/newdisk/app/AutoAttend' }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${SSH_PORT}" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -P "${SSH_PORT}" -r \
            docker-compose.prod.yml \
            atuo_attend_backend \
            "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/"

      # 可选：若 ghcr.io 镜像为私有，请在仓库 Secrets 中配置 GHCR_USERNAME + GHCR_READ_TOKEN（PAT 勾选 read:packages），
      # 否则服务器上 docker compose pull 可能报 unauthorized。
      - name: Start containers on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_BACKEND: ${{ steps.images.outputs.backend }}
          IMAGE_FRONTEND: ${{ steps.images.outputs.frontend }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USER: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 3h
          envs: IMAGE_BACKEND,IMAGE_FRONTEND,DEPLOY_PATH,GHCR_USER,GHCR_TOKEN
          script: |
            set -e
            DPATH="${DEPLOY_PATH:-/mnt/newdisk/app/AutoAttend}"
            cd "$DPATH"
            mkdir -p "$DPATH/git-repos"
            if [ -n "$GHCR_TOKEN" ] && [ -n "$GHCR_USER" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            fi
            export IMAGE_BACKEND IMAGE_FRONTEND
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            # 数据库迁移：无需在服务器单独执行 SQL。backend 容器 entrypoint（docker-entrypoint.sh）会按
            # 已 scp 的 atuo_attend_backend/.../db/migrate_manifest.txt 执行；强制重建 backend 保证每次部署都跑迁移。
            docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate backend
            # 等待 backend 健康后再重启 frontend，避免旧 Nginx 长连接指向已销毁的上游导致大量 502
            echo "等待 backend 健康检查通过..."
            for i in $(seq 1 90); do
              status=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' autoattend-backend 2>/dev/null || echo "missing")
              if [ "$status" = "healthy" ]; then
                echo "backend 已 healthy"
                break
              fi
              sleep 2
            done
            docker compose -f docker-compose.prod.yml restart frontend
