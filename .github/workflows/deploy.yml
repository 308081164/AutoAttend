# push 到 main（或 master）时：校验迁移清单与前端构建 → 构建并推送镜像 → SSH 部署 → 强制重建 backend 执行 migrate_manifest.txt 中的 SQL → 等待健康后重启前端
# 数据库迁移：由 backend 容器 docker-entrypoint.sh 在启动 Spring 前执行，无需在服务器手工 mysql。
name: Build and Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 防止新增 schema_*migration*.sql 却未写入 migrate_manifest.txt，导致推送 main 后线上库未升级
      - name: Verify DB migrate manifest
        run: bash atuo_attend_backend/scripts/check-migrate-manifest.sh

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: auto_attend_forntend/package-lock.json

      # 在推镜像前先本地构建主前端，避免仅 Docker 内失败才发现问题
      - name: Build main frontend (sanity)
        working-directory: auto_attend_forntend
        run: |
          npm ci
          npm run build

      - name: Set image names
        id: images
        run: |
          OWNER="${{ github.repository_owner }}"
          OWNER_LC=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          echo "backend=$REGISTRY/$OWNER_LC/autoattend-backend:latest" >> $GITHUB_OUTPUT
          echo "frontend=$REGISTRY/$OWNER_LC/autoattend-frontend:latest" >> $GITHUB_OUTPUT
          echo "platform_monitor_frontend=$REGISTRY/$OWNER_LC/platform-monitor-frontend:latest" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./atuo_attend_backend
          push: true
          tags: ${{ steps.images.outputs.backend }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./auto_attend_forntend
          push: true
          tags: ${{ steps.images.outputs.frontend }}

      - name: Build and push platform monitor frontend
        uses: docker/build-push-action@v5
        with:
          context: ./platform_monitor_frontend
          push: true
          tags: ${{ steps.images.outputs.platform_monitor_frontend }}

      - name: Deploy to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/mnt/newdisk/app/AutoAttend' }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${SSH_PORT}" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -P "${SSH_PORT}" -r \
            docker-compose.prod.yml \
            atuo_attend_backend \
            "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/"

      # 可选：若 ghcr.io 镜像为私有，请在仓库 Secrets 中配置 GHCR_USERNAME + GHCR_READ_TOKEN（PAT 勾选 read:packages），
      # 否则服务器上 docker compose pull 可能报 unauthorized。
      - name: Start containers on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_BACKEND: ${{ steps.images.outputs.backend }}
          IMAGE_FRONTEND: ${{ steps.images.outputs.frontend }}
          IMAGE_PLATFORM_MONITOR_FRONTEND: ${{ steps.images.outputs.platform_monitor_frontend }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USER: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 3h
          envs: IMAGE_BACKEND,IMAGE_FRONTEND,IMAGE_PLATFORM_MONITOR_FRONTEND,DEPLOY_PATH,GHCR_USER,GHCR_TOKEN
          script: |
            set -e
            DPATH="${DEPLOY_PATH:-/mnt/newdisk/app/AutoAttend}"
            cd "$DPATH"
            mkdir -p "$DPATH/git-repos"
            if [ -n "$GHCR_TOKEN" ] && [ -n "$GHCR_USER" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            fi
            export IMAGE_BACKEND IMAGE_FRONTEND IMAGE_PLATFORM_MONITOR_FRONTEND
            docker compose -f docker-compose.prod.yml pull
            # frontend 仅 depends_on backend: service_started，避免 backend 未 healthy 时 compose 整段失败且看不到诊断
            docker compose -f docker-compose.prod.yml up -d
            # 数据库迁移：镜像内 /app/db/migrate_manifest.txt，由 docker-entrypoint.sh 在启动 Spring 前执行；此处强制重建 backend 保证每次部署跑迁移。清单须与仓库同步（CI 已校验 schema_*migration*.sql）。
            docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate backend
            # 等待 backend 健康后再重启 frontend，避免旧 Nginx 长连接指向已销毁的上游导致大量 502
            echo "等待 backend 健康检查通过..."
            status=""
            # 与 compose start_period=600s + 重试对齐；每约 60s 打印一次状态，避免日志里只有 unhealthy
            for i in $(seq 1 300); do
              status=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' autoattend-backend 2>/dev/null || echo "missing")
              if [ "$status" = "healthy" ]; then
                echo "backend 已 healthy"
                break
              fi
              if [ "$((i % 30))" -eq 0 ]; then
                echo "[wait] 已等待约 $((i * 2))s，Health.Status=$status"
              fi
              sleep 2
            done
            if [ "$status" != "healthy" ]; then
              echo "backend 未在预期时间内变为 healthy，当前状态: $status"
              echo "---- State.Health JSON（含各次检查的 Output/ExitCode）----"
              docker inspect autoattend-backend --format='{{json .State.Health}}' 2>/dev/null || true
              echo "---- 容器内探测 8848（若进程已挂则失败）----"
              docker exec autoattend-backend sh -c 'curl -sS -o /dev/null -w "http_code=%{http_code}\n" --connect-timeout 3 http://127.0.0.1:8848/ || echo "curl_in_container_failed"' 2>&1 || true
              echo "---- autoattend-backend 最近日志 ----"
              docker logs --tail 200 autoattend-backend 2>&1 || true
              exit 1
            fi
            # 勿用 restart：restart 不更换容器所用镜像层；监测台/主前端必须用新拉取的镜像重建，否则 :latest 已更新仍跑旧代码
            docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate frontend platform-monitor-frontend
