# 打 tag app-v* 或手动触发时构建 Android APK / Windows / Linux，并上传 GitHub Release
name: Flutter shell release

on:
  workflow_dispatch:
  push:
    tags:
      - 'app-v*'

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/flutter_shell
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.1'
          channel: stable
          cache: true
      - name: Version from tag
        run: |
          TAG="${GITHUB_REF#refs/tags/app-v}"
          BUILD="${GITHUB_RUN_NUMBER}"
          if [ -z "$TAG" ] || [ "$TAG" = "$GITHUB_REF" ]; then TAG="1.0.0"; fi
          echo "APP_SEMVER=$TAG" >> $GITHUB_ENV
          echo "APP_BUILD=$BUILD" >> $GITHUB_ENV
          sed -i "s/^version: .*/version: ${TAG}+${BUILD}/" pubspec.yaml
          grep ^version pubspec.yaml
      - run: flutter pub get
      - name: Build APK
        env:
          APP_SHELL_BASE_URL: ${{ vars.APP_SHELL_BASE_URL }}
        run: |
          BASE="${APP_SHELL_BASE_URL:-https://example.com}"
          flutter build apk --release --dart-define=APP_BASE_URL="$BASE"
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: client/flutter_shell/build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: client/flutter_shell
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.1'
          channel: stable
          cache: true
      - name: Version from tag
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/app-v}"
          BUILD="${GITHUB_RUN_NUMBER}"
          if [ -z "$TAG" ] || [ "$TAG" = "$GITHUB_REF" ]; then TAG="1.0.0"; fi
          echo "APP_SEMVER=$TAG" >> $GITHUB_ENV
          echo "APP_BUILD=$BUILD" >> $GITHUB_ENV
          sed -i "s/^version: .*/version: ${TAG}+${BUILD}/" pubspec.yaml
      - run: flutter pub get
      - name: Build Windows
        env:
          APP_SHELL_BASE_URL: ${{ vars.APP_SHELL_BASE_URL }}
        shell: bash
        run: |
          BASE="${APP_SHELL_BASE_URL:-https://example.com}"
          flutter build windows --release --dart-define=APP_BASE_URL="$BASE"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: client/flutter_shell/build/windows/x64/runner/Release/

  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/flutter_shell
    steps:
      - uses: actions/checkout@v4
      - name: Linux deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.1'
          channel: stable
          cache: true
      - name: Version from tag
        run: |
          TAG="${GITHUB_REF#refs/tags/app-v}"
          BUILD="${GITHUB_RUN_NUMBER}"
          if [ -z "$TAG" ] || [ "$TAG" = "$GITHUB_REF" ]; then TAG="1.0.0"; fi
          echo "APP_SEMVER=$TAG" >> $GITHUB_ENV
          echo "APP_BUILD=$BUILD" >> $GITHUB_ENV
          sed -i "s/^version: .*/version: ${TAG}+${BUILD}/" pubspec.yaml
      - run: flutter pub get
      - name: Build Linux
        env:
          APP_SHELL_BASE_URL: ${{ vars.APP_SHELL_BASE_URL }}
        run: |
          BASE="${APP_SHELL_BASE_URL:-https://example.com}"
          flutter build linux --release --dart-define=APP_BASE_URL="$BASE"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: client/flutter_shell/build/linux/x64/release/bundle/

  release:
    needs: [build-android, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Pack archives
        run: |
          VER="${GITHUB_REF#refs/tags/app-v}"
          mkdir -p dist
          cp artifacts/android-apk/app-release.apk "dist/LiubangProject-Android-${VER}.apk" || true
          (cd artifacts/windows-exe && zip -r "../../dist/LiubangProject-Windows-x64-${VER}.zip" .) || true
          (cd artifacts/linux-bundle && tar czf "../../dist/LiubangProject-Linux-x64-${VER}.tar.gz" .) || true
          cd dist && sha256sum * > checksums.txt || true
          ls -la dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
