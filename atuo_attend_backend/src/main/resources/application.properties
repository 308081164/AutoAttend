spring.application.name=atuo_attend_backend

# ===== Actuator（Docker healthcheck、运维探活；不暴露敏感端点）=====
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# 协作 CSV+AI 导入等上传（单文件上限）
spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=8MB

# ===== 协作多维表：单表（table_id）最大记录条数 =====
app.collab.table.max-records=${COLLAB_TABLE_MAX_RECORDS:1500}

# ===== 协作 CSV 智能导入（DeepSeek 分片）=====
# 单批数据行数越小，单次 /chunk 越不易超过 Nginx proxy_read_timeout；建议 8～15。范围 5～30，可用环境变量覆盖。
app.collab.csv-ai-import.max-rows-per-chunk=${COLLAB_CSV_AI_CHUNK_ROWS:12}

# ===== DeepSeek HTTP 客户端（避免无限阻塞；应小于或接近上游 Nginx proxy_read_timeout）=====
app.deepseek.http.connect-timeout-seconds=${DEEPSEEK_HTTP_CONNECT_TIMEOUT_SECONDS:30}
app.deepseek.http.read-timeout-seconds=${DEEPSEEK_HTTP_READ_TIMEOUT_SECONDS:600}

# ===== 数据库（MySQL）=====
# 通过环境变量覆盖即可在不同环境部署：
# DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD
spring.datasource.url=jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:autoattend}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis
mybatis.configuration.map-underscore-to-camel-case=true

# ===== MVP 管理员账号（可通过环境变量覆盖）=====
autoattend.admin.username=${ADMIN_USERNAME:admin}
autoattend.admin.password=${ADMIN_PASSWORD:admin123}

# ===== GitHub API（方式 1，用于拉取 commit diff）=====
# 设置 GITHUB_TOKEN 可提高限流并支持私有仓库
github.token=${GITHUB_TOKEN:}
# 大陆服务器无法直连 api.github.com 时，可设置代理，如 http://127.0.0.1:7890 或 socks5://127.0.0.1:1080
github.api.proxy=${GITHUB_API_PROXY:}

# ===== GitHub Webhook 回调地址（用于报价页自动创建 webhook）=====
# 若为空则按请求的 X-Forwarded-* / Host 推断；生产建议显式配置为公网可访问地址。
app.github.webhook.url=${APP_GITHUB_WEBHOOK_URL:http://39.102.213.51:8848/api/webhooks/github}

# ===== 本地 Git 兜底（方式 3：API 失败时 clone/fetch + git show）=====
# 设置目录后启用；国内网络较慢，超时已做较长默认值
git.workspace=${GIT_WORKSPACE:}
git.clone.timeout.seconds=${GIT_CLONE_TIMEOUT_SECONDS:600}
git.fetch.timeout.seconds=${GIT_FETCH_TIMEOUT_SECONDS:300}
git.show.timeout.seconds=${GIT_SHOW_TIMEOUT_SECONDS:60}
git.diff.enabled=${GIT_DIFF_ENABLED:true}

# ===== 协作模块：JWT ====
collab.jwt.secret=${COLLAB_JWT_SECRET:autoattend-collab-jwt-secret-change-in-production}
collab.jwt.expireSeconds=7200

# ===== 项目每日进展总结（DeepSeek，按仓库按日）=====
# 默认每天 04:00（配置时区）总结「昨天」有提交的仓库；关闭调度可将 app.daily-summary.enabled=false
app.daily-summary.enabled=true
app.daily-summary.cron=0 0 4 * * *
app.daily-summary.timezone=Asia/Shanghai

# ===== AI 分析定时任务（自动扫描新提交并执行分析）=====
# 每轮执行完毕后的间隔毫秒数，默认 600000（10 分钟）；可通过环境变量 AI_ANALYSIS_SCHEDULE_DELAY_MS 覆盖
app.ai-analysis.schedule.fixed-delay-ms=${AI_ANALYSIS_SCHEDULE_DELAY_MS:600000}

# ===== Diff 补拉定时任务（自动为无 Diff 的提交拉取并落库）=====
# 每轮执行完毕后的间隔毫秒数，默认 900000（15 分钟）；可通过 DIFF_FETCH_SCHEDULE_DELAY_MS 覆盖
app.diff-fetch.schedule.fixed-delay-ms=${DIFF_FETCH_SCHEDULE_DELAY_MS:900000}
# 每轮最多拉取几条，默认 5，避免单次调度耗时过长
app.diff-fetch.schedule.max-per-run=${DIFF_FETCH_MAX_PER_RUN:5}

# ===== 协作模块：MinIO ====
minio.endpoint=${MINIO_ENDPOINT:http://127.0.0.1:9000}
minio.accessKey=${MINIO_ACCESS_KEY:minioadmin}
minio.secretKey=${MINIO_SECRET_KEY:minioadmin}
minio.bucket=${MINIO_BUCKET:autoattend-attachments}

# ===== 报价/合同 PDF 导出：中文字体（.ttf/.otf/.ttc），可选；不配则尝试 classpath:fonts/NotoSansSC-Regular.otf、Windows simhei、常见 Linux 字体路径
# quote.export.cjk-font-path=
