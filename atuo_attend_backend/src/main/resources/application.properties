spring.application.name=atuo_attend_backend

# ===== 数据库（MySQL）=====
# 通过环境变量覆盖即可在不同环境部署：
# DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD
spring.datasource.url=jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:autoattend}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis
mybatis.configuration.map-underscore-to-camel-case=true

# ===== MVP 管理员账号（可通过环境变量覆盖）=====
autoattend.admin.username=${ADMIN_USERNAME:admin}
autoattend.admin.password=${ADMIN_PASSWORD:admin123}
