spring.application.name=atuo_attend_backend

# ===== Actuator（Docker healthcheck、运维探活；不暴露敏感端点）=====
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
# 启用后提供 /actuator/health/liveness 与 readiness；Compose 应对 liveness 探活（整体 health 在 DB 等 DOWN 时可能 503）
management.endpoint.health.probes.enabled=true

# 协作 CSV+AI 导入等上传（单文件上限）
spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=8MB

# ===== 协作多维表：单表（table_id）最大记录条数 =====
app.collab.table.max-records=${COLLAB_TABLE_MAX_RECORDS:1500}

# ===== 协作 CSV 智能导入（DeepSeek 分片）=====
# 单批数据行数越小，单次 /chunk 越不易超过 Nginx proxy_read_timeout；建议 8～15。范围 5～30，可用环境变量覆盖。
app.collab.csv-ai-import.max-rows-per-chunk=${COLLAB_CSV_AI_CHUNK_ROWS:12}

# ===== DeepSeek HTTP 客户端（避免无限阻塞；应小于或接近上游 Nginx proxy_read_timeout）=====
app.deepseek.http.connect-timeout-seconds=${DEEPSEEK_HTTP_CONNECT_TIMEOUT_SECONDS:30}
app.deepseek.http.read-timeout-seconds=${DEEPSEEK_HTTP_READ_TIMEOUT_SECONDS:600}

# ===== 数据库（MySQL）=====
# 通过环境变量覆盖即可在不同环境部署：
# DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD
spring.datasource.url=jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:autoattend}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis
mybatis.configuration.map-underscore-to-camel-case=true

# ===== 租户管理员短信验证码（阿里云；不配则仍为密码登录，不校验短信）=====
# 与部署环境变量一致：ALIYUN_ACCESS_KEY_ID, ALIYUN_ACCESS_KEY_SECRET, ALIYUN_SMS_SIGN_NAME, ALIYUN_SMS_TEMPLATE_CODE
# 模板 JSON 中验证码字段名：勿在 properties 里写 ALIYUN_SMS_TEMPLATE_PARAM_CODE=${...}（会与自身同名占位符循环）；
# 请用环境变量覆盖，或在 AdminSmsProperties 的 @Value 默认值中调整。
# 短信冷却与有效期默认值（可被同名的环境变量覆盖）
ADMIN_SMS_CODE_TTL_MINUTES=5
ADMIN_SMS_RESEND_INTERVAL_SECONDS=120
ADMIN_SMS_MAX_SENDS_PER_PHONE_PER_DAY=10
ADMIN_SMS_RATE_LIMIT_ZONE=Asia/Shanghai

# ===== 旧版环境变量管理员（已废弃；租户管理员见 aa_tenant_admin_user 与启动种子）=====
autoattend.admin.username=${ADMIN_USERNAME:admin}
autoattend.admin.password=${ADMIN_PASSWORD:admin123}

# ===== 监测平台（仅运维；不配密码则 /api/platform/auth/login 不可用）=====
platform.ops.password=${PLATFORM_OPS_PASSWORD:}

# ===== Nexus 快捷运维（开发环境加密 key；生产请用环境变量覆盖）=====
nexus.crypto.dev-key=${NEXUS_CRYPTO_DEV_KEY:dev-nexus-crypto-key-change-me}
# 调度器：固定延迟检查是否需要触发自动巡检（数据库里会决定是否真正执行）
nexus.scheduler.fixed-delay-ms=${NEXUS_SCHEDULER_FIXED_DELAY_MS:60000}
# CPU 指标拉取窗口：用于 DescribeInstanceMonitorData（先支持 CPU）
nexus.metrics.cpu.period-seconds=${NEXUS_CPU_PERIOD_SECONDS:60}
nexus.metrics.cpu.window-minutes=${NEXUS_CPU_WINDOW_MINUTES:60}
# 单轮最多同步实例数（防止单账号过大导致任务超时）
nexus.sync.max-instances-per-run=${NEXUS_MAX_INSTANCES_PER_RUN:200}
# 告警规则评估（基于已落库的 CPU/内存指标点）
nexus.alert.evaluation-enabled=${NEXUS_ALERT_EVAL_ENABLED:true}
nexus.alert.evaluation-delay-ms=${NEXUS_ALERT_EVAL_DELAY_MS:120000}

# ===== Nexus 备案查询（可选）=====
# 云市场第三方 ICP 查询：在阿里云云市场购买对应 API 后，将商品文档中的 HTTPS 地址填入（可用 {domain} 占位或依赖 ?domain= 拼接）
nexus.icp.market.api-url=${NEXUS_ICP_MARKET_API_URL:}
# 云市场 AppCode（Authorization: APPCODE xxx）；勿提交到仓库，使用环境变量
nexus.icp.market.app-code=${NEXUS_ICP_MARKET_APP_CODE:}

# ===== GitHub API（方式 1，用于拉取 commit diff）=====
# 设置 GITHUB_TOKEN 可提高限流并支持私有仓库
github.token=${GITHUB_TOKEN:}
# 大陆服务器无法直连 api.github.com 时，可设置代理，如 http://127.0.0.1:7890 或 socks5://127.0.0.1:1080
github.api.proxy=${GITHUB_API_PROXY:}

# ===== GitHub Webhook 回调地址（用于报价页自动创建 webhook）=====
# 若为空则按请求的 X-Forwarded-* / Host 推断；生产建议显式配置为公网可访问地址。
app.github.webhook.url=${APP_GITHUB_WEBHOOK_URL:http://39.102.213.51:8848/api/webhooks/github}

# ===== 本地 Git 兜底（方式 3：API 失败时 clone/fetch + git show）=====
# 设置目录后启用；国内网络较慢，超时已做较长默认值
git.workspace=${GIT_WORKSPACE:}
git.clone.timeout.seconds=${GIT_CLONE_TIMEOUT_SECONDS:600}
git.fetch.timeout.seconds=${GIT_FETCH_TIMEOUT_SECONDS:300}
git.show.timeout.seconds=${GIT_SHOW_TIMEOUT_SECONDS:60}
git.diff.enabled=${GIT_DIFF_ENABLED:true}

# ===== 协作模块：JWT ====
collab.jwt.secret=${COLLAB_JWT_SECRET:autoattend-collab-jwt-secret-change-in-production}
collab.jwt.expireSeconds=7200

# ===== 项目每日进展总结（DeepSeek，按仓库按日）=====
# 默认每天 04:00（配置时区）总结「昨天」有提交的仓库；关闭调度可将 app.daily-summary.enabled=false
app.daily-summary.enabled=true
app.daily-summary.cron=0 0 4 * * *
app.daily-summary.timezone=Asia/Shanghai

# ===== 日报邮件（项目日报 + 开发者日报）=====
# SMTP 与定时 Cron/时区/开关由平台监测台「系统配置」写入 aa_system_config（tenant_id=0），
# 并由 PlatformReportMailScheduler 动态调度。以下属性仅为兼容/文档占位，运行时已不依赖。
app.report-mail.enabled=true
app.report-mail.cron=0 30 4 * * *
app.report-mail.timezone=${app.daily-summary.timezone:Asia/Shanghai}

# ===== AI 分析定时任务（自动扫描新提交并执行分析）=====
# 每轮执行完毕后的间隔毫秒数，默认 600000（10 分钟）；可通过环境变量 AI_ANALYSIS_SCHEDULE_DELAY_MS 覆盖
app.ai-analysis.schedule.fixed-delay-ms=${AI_ANALYSIS_SCHEDULE_DELAY_MS:600000}

# ===== Diff 补拉定时任务（自动为无 Diff 的提交拉取并落库）=====
# 每轮执行完毕后的间隔毫秒数，默认 900000（15 分钟）；可通过 DIFF_FETCH_SCHEDULE_DELAY_MS 覆盖
app.diff-fetch.schedule.fixed-delay-ms=${DIFF_FETCH_SCHEDULE_DELAY_MS:900000}
# 每轮最多拉取几条，默认 5，避免单次调度耗时过长
app.diff-fetch.schedule.max-per-run=${DIFF_FETCH_MAX_PER_RUN:5}

# ===== 快原型 Penpot Beta（默认：每租户自动注册 Penpot 账号并加密保存 Access Token；无需平台级 PENPOT_ACCESS_TOKEN）=====
# 可选：仍支持平台级 Token/账号（运维脚本或兼容旧部署）；租户模式优先使用库内凭证
app.penpot.enabled=${PENPOT_ENABLED:false}
app.penpot.base-url=${PENPOT_INTERNAL_URI:http://penpot-frontend:8080}
# 可选：仅 RPC 与浏览器公网地址分离时使用（默认空则与 base-url 相同）
app.penpot.api-base-url=${PENPOT_API_BASE_URL:}
# 浏览器打开工作区；不配置则与内网 RPC 基址相同（可能仅容器内可访问）
app.penpot.public-uri=${PENPOT_PUBLIC_URI:}
app.penpot.access-token=${PENPOT_ACCESS_TOKEN:}
app.penpot.email=${PENPOT_EMAIL:}
app.penpot.password=${PENPOT_PASSWORD:}
# 租户自动开户邮箱域（Penpot 注册用）；生产建议设为自有域或自托管允许的域
app.penpot.tenant-email-domain=${PENPOT_TENANT_EMAIL_DOMAIN:penpot.local}
app.penpot.tenant-token-name-prefix=${PENPOT_TENANT_TOKEN_NAME_PREFIX:autoattend}
# 派生租户 Penpot 密码的盐（与 tenantId 哈希）；生产务必通过环境变量设置长随机串
app.penpot.tenant-credential-pepper=${PENPOT_TENANT_CREDENTIAL_PEPPER:}

# ===== 协作模块：MinIO ====
minio.endpoint=${MINIO_ENDPOINT:http://127.0.0.1:9000}
minio.accessKey=${MINIO_ACCESS_KEY:minioadmin}
minio.secretKey=${MINIO_SECRET_KEY:minioadmin}
minio.bucket=${MINIO_BUCKET:autoattend-attachments}

# ===== 报价/合同 PDF 导出：中文字体（.ttf/.otf/.ttc），可选；不配则尝试 classpath:fonts/NotoSansSC-Regular.otf、Windows simhei、常见 Linux 字体路径
# quote.export.cjk-font-path=
