# 本地/CI 运行 mvn test 时不依赖宿主机 MySQL（与生产 MySQL 分离）
spring.datasource.url=jdbc:h2:mem:autoattend_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 显式提供占位符，避免测试环境变量为空串时覆盖掉主配置默认值导致启动失败
collab.jwt.secret=test-jwt-secret-for-unit-tests-min-32-chars!!

# MinIO：测试用占位（启动时可能连接失败，ensureBucket 仅打 warn）
minio.endpoint=http://127.0.0.1:9000
minio.accessKey=minioadmin
minio.secretKey=minioadmin
minio.bucket=autoattend-attachments-test

# Nexus 加密（测试占位；避免 CI 中 NEXUS_CRYPTO_DEV_KEY 为空串时占位符解析失败）
nexus.crypto.dev-key=test-nexus-crypto-key-for-ci-only-32bytes-min!!
