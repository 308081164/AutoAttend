# 协作表 CSV 智能导入、单次提交 AI 等接口会长时间等待后端调用 DeepSeek。
# 若 Nginx 使用默认 proxy_read_timeout（常见 60s），单批 chunk 仍可能 504。
# 在反代到 Spring Boot 的 location 中增加（或提高到）例如 300s：

# location /api/ {
#     proxy_pass http://127.0.0.1:8080;
#     proxy_http_version 1.1;
#     proxy_set_header Host $host;
#     proxy_set_header X-Real-IP $remote_addr;
#     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#     proxy_set_header X-Forwarded-Proto $scheme;
#
#     proxy_connect_timeout 60s;
#     proxy_send_timeout 300s;
#     proxy_read_timeout 300s;
# }

# 说明：
# - proxy_read_timeout 应 ≥ 单批 DeepSeek 最坏耗时；可与后端 app.deepseek.http.read-timeout-seconds 对齐思路。
# - 同时可将 COLLAB_CSV_AI_CHUNK_ROWS 调小（如 8），减少单批工作量。
